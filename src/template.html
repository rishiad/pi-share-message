<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>pi message</title>
  <script>
    const tailwindScript = document.createElement("script");
    tailwindScript.src = "https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4";
    document.head.appendChild(tailwindScript);
  </script>
  <style>
    :root {
      --font-sans: Inter, ui-sans-serif, system-ui, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: #2f2f2f; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    a { color: #337ab7; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .markdown-body { font-size: 17px; line-height: 1.65; }
    .markdown-body > :first-child { margin-top: 0; }
    .markdown-body h1 { margin: 2rem 0 1rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .75rem; font-size: 2.25rem; font-weight: 700; line-height: 1.25; }
    .markdown-body h2 { margin: 1.75rem 0 .75rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .5rem; font-size: 1.875rem; font-weight: 600; line-height: 1.25; }
    .markdown-body h3 { margin: 1.5rem 0 .75rem; font-size: 1.5rem; font-weight: 600; }
    .markdown-body h4 { margin: 1.25rem 0 .5rem; font-size: 1.25rem; font-weight: 600; }
    .markdown-body p { margin: 1rem 0; }
    .markdown-body ul { margin: 1rem 0; padding-left: 2rem; list-style: disc; }
    .markdown-body ol { margin: 1rem 0; padding-left: 2rem; list-style: decimal; }
    .markdown-body li { margin: .25rem 0; }
    .markdown-body blockquote { margin: 1rem 0; border-left: 4px solid #ddd; padding-left: 1rem; color: #777; }
    .markdown-body code { border-radius: .25rem; background: #f3f3f3; padding: .125rem .375rem; font-family: var(--font-mono); font-size: .9em; }
    .markdown-body pre { margin: 1.25rem 0; overflow-x: auto; border-radius: .25rem; background: #f5f5f5; padding: 1.25rem; }
    .markdown-body pre code { background: transparent; padding: 0; font-size: 14px; line-height: 1.5; }
    .markdown-body table { width: 100%; margin: 1.25rem 0; border-collapse: collapse; }
    .markdown-body th, .markdown-body td { border: 1px solid #ddd; padding: .5rem .75rem; text-align: left; }
    .markdown-body th { background: #f5f5f5; font-weight: 600; }
    .markdown-body hr { margin: 2rem 0; border: 0; border-top: 1px solid #ddd; }
    .markdown-body img { max-width: 100%; }
    .toc a { display: block; overflow: hidden; padding: .25rem 0; color: #666; font-size: .875rem; text-overflow: ellipsis; white-space: nowrap; }
    .toc a:hover { color: #222; text-decoration: none; }
    .toc a[data-level="2"] { padding-left: .75rem; }
    .toc a[data-level="3"] { padding-left: 1.5rem; }
    .toc a[data-level="4"] { padding-left: 2.25rem; }
  </style>
</head>
<body>
  <div id="app"></div>

  <template id="page-template">
    <main class="mx-auto grid min-h-screen max-w-[1100px] grid-cols-1 gap-12 px-6 py-8 lg:grid-cols-[minmax(0,760px)_260px]">
      <article>
        <header class="mb-8 border-b border-[#e5e5e5] pb-4">
          <div data-role class="text-xs font-semibold uppercase tracking-widest text-[#999]"></div>
          <time data-date class="mt-1 block text-sm text-[#999]"></time>
        </header>
        <div id="content" data-content class="markdown-body"></div>
      </article>
      <aside class="hidden border-l border-[#e5e5e5] pl-7 lg:block">
        <nav id="toc" class="toc sticky top-8"></nav>
      </aside>
    </main>
  </template>

  <textarea id="message-data" hidden>{{data}}</textarea>

  <script>
    const message = JSON.parse(document.querySelector("#message-data").value);
    const page = document.querySelector("#page-template").content.cloneNode(true);
    page.querySelector("[data-role]").textContent = `pi · ${message.role}`;
    page.querySelector("[data-date]").textContent = message.date;
    page.querySelector("[data-content]").innerHTML = message.body;
    document.querySelector("#app").replaceChildren(page);
    document.title = message.title;

    const toc = document.querySelector("#toc");
    document.querySelectorAll("#content h1,#content h2,#content h3,#content h4").forEach((heading, index) => {
      heading.id = heading.id || `heading-${index}`;
      const link = document.createElement("a");
      link.href = `#${heading.id}`;
      link.dataset.level = heading.tagName.slice(1);
      link.textContent = heading.textContent;
      toc.appendChild(link);
    });
    if (!toc.children.length) toc.parentElement.remove();
  </script>
</body>
</html>
