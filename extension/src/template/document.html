<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>pi message</title>
    <script>
      const tailwindScript = document.createElement("script");
      tailwindScript.src =
        "https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4";
      document.head.appendChild(tailwindScript);
    </script>
    <style>
      {{styles}}
    </style>
  </head>
  <body>
    <div id="app"></div>

    <template id="page-template">
      <main
        class="mx-auto grid min-h-screen max-w-[980px] grid-cols-1 gap-6 px-4 py-5 lg:grid-cols-[minmax(0,680px)_220px]"
      >
        <article>
          <div id="content" data-content class="markdown-body"></div>
        </article>
        <aside class="hidden lg:block">
          <div class="sticky top-5">
            <nav id="toc" class="toc"></nav>
            <a class="made-with" href="https://github.com/rishiad/pi-share-message">
              Made with Pi Share Message
            </a>
          </div>
        </aside>
      </main>
    </template>

    <textarea id="message-data" hidden>{{data}}</textarea>

    <script>
{{script}}
    </script>
  </body>
</html>
