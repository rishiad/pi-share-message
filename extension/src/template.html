<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>pi message</title>
  <script>
    const tailwindScript = document.createElement("script");
    tailwindScript.src = "https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4";
    document.head.appendChild(tailwindScript);
  </script>
  <style>
    :root {
      --font-sans: Inter, ui-sans-serif, system-ui, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: #2f2f2f; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    a { color: #337ab7; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .markdown-body { font-size: 15px; line-height: 1.55; }
    .markdown-body > :first-child { margin-top: 0; }
    .markdown-body h1 { margin: 1.25rem 0 .6rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .4rem; font-size: 1.8rem; font-weight: 700; line-height: 1.25; }
    .markdown-body h2 { margin: 1rem 0 .4rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .3rem; font-size: 1.45rem; font-weight: 600; line-height: 1.25; }
    .markdown-body h3 { margin: .9rem 0 .4rem; font-size: 1.2rem; font-weight: 600; }
    .markdown-body h4 { margin: .75rem 0 .3rem; font-size: 1.05rem; font-weight: 600; }
    .markdown-body p { margin: .6rem 0; }
    .markdown-body ul { margin: .6rem 0; padding-left: 1.5rem; list-style: disc; }
    .markdown-body ol { margin: .6rem 0; padding-left: 1.5rem; list-style: decimal; }
    .markdown-body li { margin: .1rem 0; }
    .markdown-body blockquote { margin: .6rem 0; border-left: 3px solid #ddd; padding-left: .75rem; color: #777; }
    .markdown-body code { border-radius: .2rem; background: #f3f3f3; padding: .075rem .25rem; font-family: var(--font-mono); font-size: .88em; }
    .markdown-body pre { margin: .8rem 0; overflow-x: auto; border-radius: .25rem; background: #f5f5f5; padding: .75rem; }
    .markdown-body pre code { background: transparent; padding: 0; font-size: 12px; line-height: 1.4; }
    .markdown-body pre code.hljs { display: block; overflow-x: auto; padding: 0; }
    .hljs { color: #24292e; }
    .hljs-doctag, .hljs-keyword, .hljs-meta .hljs-keyword, .hljs-template-tag, .hljs-template-variable, .hljs-type, .hljs-variable.language_ { color: #d73a49; }
    .hljs-title, .hljs-title.class_, .hljs-title.class_.inherited__, .hljs-title.function_ { color: #6f42c1; }
    .hljs-attr, .hljs-attribute, .hljs-literal, .hljs-meta, .hljs-number, .hljs-operator, .hljs-variable, .hljs-selector-attr, .hljs-selector-class, .hljs-selector-id { color: #005cc5; }
    .hljs-regexp, .hljs-string, .hljs-meta .hljs-string { color: #032f62; }
    .hljs-built_in, .hljs-symbol { color: #e36209; }
    .hljs-comment, .hljs-code, .hljs-formula { color: #6a737d; }
    .hljs-name, .hljs-quote, .hljs-selector-tag, .hljs-selector-pseudo { color: #22863a; }
    .hljs-section { color: #005cc5; font-weight: 700; }
    .hljs-bullet { color: #735c0f; }
    .hljs-emphasis { color: #24292e; font-style: italic; }
    .hljs-strong { color: #24292e; font-weight: 700; }
    .markdown-body table { width: 100%; margin: .8rem 0; border-collapse: collapse; }
    .markdown-body th, .markdown-body td { border: 1px solid #ddd; padding: .3rem .5rem; text-align: left; }
    .markdown-body th { background: #f5f5f5; font-weight: 600; }
    .markdown-body hr { margin: 1rem 0; border: 0; border-top: 1px solid #ddd; }
    .markdown-body img { max-width: 100%; }
    .toc { max-height: calc(100vh - 3rem); overflow-y: auto; padding-right: .25rem; }
    .toc-group + .toc-group { margin-top: .65rem; }
    .toc a { display: block; overflow: hidden; border-left: 2px solid transparent; padding: .25rem .4rem .25rem 2rem; color: #777; font-size: .9rem; line-height: 1.35; text-overflow: ellipsis; white-space: nowrap; transition: color .15s, border-color .15s; }
    .toc a:hover { color: #222; text-decoration: none; }
    .toc a.active, .toc a.active-parent { border-left-color: #111; color: #111; font-weight: 700; }
    .toc a[data-level="2"] { padding-left: 3rem; color: #888; font-size: .85rem; }
    .toc a[data-level="3"] { padding-left: 4rem; color: #888; font-size: .82rem; }
    .toc a[data-level="4"] { padding-left: 5rem; color: #888; font-size: .8rem; }
    .toc-actions { margin-top: 1rem; padding-left: 2rem; }
    .toc-actions button { display: block; border: 0; background: transparent; padding: .3rem 0; color: #999; font: inherit; font-size: .85rem; cursor: pointer; }
    .toc-actions button:hover { color: #222; }
  </style>
</head>
<body>
  <div id="app"></div>

  <template id="page-template">
    <main class="mx-auto grid min-h-screen max-w-[980px] grid-cols-1 gap-6 px-4 py-5 lg:grid-cols-[minmax(0,680px)_220px]">
      <article>
        <header class="mb-5 border-b border-[#e5e5e5] pb-2">
          <div data-role class="text-xs font-semibold uppercase tracking-widest text-[#999]"></div>
          <time data-date class="mt-1 block text-sm text-[#999]"></time>
        </header>
        <div id="content" data-content class="markdown-body"></div>
      </article>
      <aside class="hidden lg:block">
        <nav id="toc" class="toc sticky top-5"></nav>
      </aside>
    </main>
  </template>

  <textarea id="message-data" hidden>{{data}}</textarea>

  <script>
    const message = JSON.parse(document.querySelector("#message-data").value);
    const page = document.querySelector("#page-template").content.cloneNode(true);
    page.querySelector("[data-role]").textContent = `pi · ${message.role}`;
    page.querySelector("[data-date]").textContent = message.date;
    page.querySelector("[data-content]").innerHTML = message.body;
    document.querySelector("#app").replaceChildren(page);
    document.title = message.title;

    const shareBaseUrl = document.querySelector('meta[name="pi-share-base-url"]')?.content;
    const headingUrl = (id) => shareBaseUrl
      ? `${shareBaseUrl}/session.html&heading=${encodeURIComponent(id)}`
      : `#${id}`;
    const toc = document.querySelector("#toc");
    const headings = [...document.querySelectorAll("#content h1,#content h2,#content h3,#content h4")];
    const baseLevel = headings.length ? Math.min(...headings.map((heading) => Number(heading.tagName.slice(1)))) : 1;
    const groups = [];
    const groupForHeading = [];
    const links = [];

    headings.forEach((heading, index) => {
      heading.id = heading.id || `heading-${index}`;
      const level = Number(heading.tagName.slice(1));
      if (level === baseLevel || !groups.length) groups.push({ items: [] });
      const link = document.createElement("a");
      link.href = headingUrl(heading.id);
      link.dataset.level = String(level);
      link.textContent = heading.textContent;
      groups.at(-1).items.push({ heading, link });
      groupForHeading[index] = groups.length - 1;
      links.push(link);
    });

    if (!links.length) {
      toc.parentElement.remove();
    } else {
      groups.forEach((group) => {
        const element = document.createElement("div");
        element.className = "toc-group";
        group.items.forEach(({ link }) => element.appendChild(link));
        toc.appendChild(element);
      });

      const actions = document.createElement("div");
      actions.className = "toc-actions";
      const expandButton = document.createElement("button");
      expandButton.type = "button";
      expandButton.textContent = "Expand all";
      const topButton = document.createElement("button");
      topButton.type = "button";
      topButton.textContent = "Back to top";
      const bottomButton = document.createElement("button");
      bottomButton.type = "button";
      bottomButton.textContent = "Go to bottom";
      actions.append(expandButton, topButton, bottomButton);
      toc.appendChild(actions);

      let allExpanded = false;
      let activeGroupIndex = 0;
      const updateVisibility = () => groups.forEach((group, index) => {
        group.items.slice(1).forEach(({ link }) => {
          link.hidden = !allExpanded && index !== activeGroupIndex;
        });
      });
      const updateActiveHeading = () => {
        const atBottom = document.documentElement.scrollHeight > window.innerHeight &&
          window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 1;
        const activeIndex = atBottom ? headings.length - 1 : headings.reduce(
          (active, heading, index) => heading.getBoundingClientRect().top <= 112 ? index : active,
          0,
        );
        activeGroupIndex = groupForHeading[activeIndex] ?? 0;
        links.forEach((link, index) => {
          const active = index === activeIndex;
          link.classList.toggle("active", active);
          link.classList.toggle("active-parent", groupForHeading[index] === activeGroupIndex && index !== activeIndex && headings[index].tagName === `H${baseLevel}`);
          if (active) link.setAttribute("aria-current", "location");
          else link.removeAttribute("aria-current");
        });
        updateVisibility();
      };

      expandButton.addEventListener("click", () => {
        allExpanded = !allExpanded;
        expandButton.textContent = allExpanded ? "Collapse all" : "Expand all";
        updateVisibility();
      });
      topButton.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
      bottomButton.addEventListener("click", () => window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" }));
      window.addEventListener("scroll", updateActiveHeading, { passive: true });
      window.addEventListener("resize", updateActiveHeading);
      updateActiveHeading();

      const requestedHeading = new URLSearchParams(document.querySelector('meta[name="pi-url-params"]')?.content ?? "").get("heading");
      const target = requestedHeading && document.getElementById(requestedHeading.replace(/^#/, ""));
      if (target) requestAnimationFrame(() => target.scrollIntoView());
    }
  </script>
</body>
</html>
