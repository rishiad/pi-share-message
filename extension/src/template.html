<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>pi message</title>
  <script>
    const tailwindScript = document.createElement("script");
    tailwindScript.src = "https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4";
    document.head.appendChild(tailwindScript);
  </script>
  <style>
    :root {
      --font-sans: Inter, ui-sans-serif, system-ui, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: #2f2f2f; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    a { color: #337ab7; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .markdown-body { font-size: 16px; line-height: 1.6; }
    .markdown-body > :first-child { margin-top: 0; }
    .markdown-body h1 { margin: 1.5rem 0 .75rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .5rem; font-size: 2.1rem; font-weight: 700; line-height: 1.25; }
    .markdown-body h2 { margin: 1.25rem 0 .5rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .375rem; font-size: 1.7rem; font-weight: 600; line-height: 1.25; }
    .markdown-body h3 { margin: 1.1rem 0 .5rem; font-size: 1.35rem; font-weight: 600; }
    .markdown-body h4 { margin: .9rem 0 .375rem; font-size: 1.15rem; font-weight: 600; }
    .markdown-body p { margin: .75rem 0; }
    .markdown-body ul { margin: .75rem 0; padding-left: 1.75rem; list-style: disc; }
    .markdown-body ol { margin: .75rem 0; padding-left: 1.75rem; list-style: decimal; }
    .markdown-body li { margin: .125rem 0; }
    .markdown-body blockquote { margin: .75rem 0; border-left: 4px solid #ddd; padding-left: .875rem; color: #777; }
    .markdown-body code { border-radius: .25rem; background: #f3f3f3; padding: .1rem .3rem; font-family: var(--font-mono); font-size: .9em; }
    .markdown-body pre { margin: 1rem 0; overflow-x: auto; border-radius: .25rem; background: #f5f5f5; padding: 1rem; }
    .markdown-body pre code { background: transparent; padding: 0; font-size: 14px; line-height: 1.45; }
    .markdown-body pre code.hljs { display: block; overflow-x: auto; padding: 0; }
    .hljs { color: #24292e; }
    .hljs-doctag, .hljs-keyword, .hljs-meta .hljs-keyword, .hljs-template-tag, .hljs-template-variable, .hljs-type, .hljs-variable.language_ { color: #d73a49; }
    .hljs-title, .hljs-title.class_, .hljs-title.class_.inherited__, .hljs-title.function_ { color: #6f42c1; }
    .hljs-attr, .hljs-attribute, .hljs-literal, .hljs-meta, .hljs-number, .hljs-operator, .hljs-variable, .hljs-selector-attr, .hljs-selector-class, .hljs-selector-id { color: #005cc5; }
    .hljs-regexp, .hljs-string, .hljs-meta .hljs-string { color: #032f62; }
    .hljs-built_in, .hljs-symbol { color: #e36209; }
    .hljs-comment, .hljs-code, .hljs-formula { color: #6a737d; }
    .hljs-name, .hljs-quote, .hljs-selector-tag, .hljs-selector-pseudo { color: #22863a; }
    .hljs-section { color: #005cc5; font-weight: 700; }
    .hljs-bullet { color: #735c0f; }
    .hljs-emphasis { color: #24292e; font-style: italic; }
    .hljs-strong { color: #24292e; font-weight: 700; }
    .markdown-body table { width: 100%; margin: 1rem 0; border-collapse: collapse; }
    .markdown-body th, .markdown-body td { border: 1px solid #ddd; padding: .4rem .6rem; text-align: left; }
    .markdown-body th { background: #f5f5f5; font-weight: 600; }
    .markdown-body hr { margin: 1.25rem 0; border: 0; border-top: 1px solid #ddd; }
    .markdown-body img { max-width: 100%; }
    .toc a { display: block; overflow: hidden; border-left: 2px solid transparent; padding: .15rem .5rem; color: #666; font-size: .875rem; text-overflow: ellipsis; white-space: nowrap; transition: color .15s, background-color .15s, border-color .15s; }
    .toc a:hover { color: #222; text-decoration: none; }
    .toc a.active { border-left-color: #337ab7; background: #f5f8fb; color: #222; font-weight: 600; }
    .toc a[data-level="2"] { padding-left: .75rem; }
    .toc a[data-level="3"] { padding-left: 1.25rem; }
    .toc a[data-level="4"] { padding-left: 1.75rem; }
  </style>
</head>
<body>
  <div id="app"></div>

  <template id="page-template">
    <main class="mx-auto grid min-h-screen max-w-[1100px] grid-cols-1 gap-8 px-5 py-6 lg:grid-cols-[minmax(0,760px)_260px]">
      <article>
        <header class="mb-6 border-b border-[#e5e5e5] pb-3">
          <div data-role class="text-xs font-semibold uppercase tracking-widest text-[#999]"></div>
          <time data-date class="mt-1 block text-sm text-[#999]"></time>
        </header>
        <div id="content" data-content class="markdown-body"></div>
      </article>
      <aside class="hidden border-l border-[#e5e5e5] pl-5 lg:block">
        <nav id="toc" class="toc sticky top-6"></nav>
      </aside>
    </main>
  </template>

  <textarea id="message-data" hidden>{{data}}</textarea>

  <script>
    const message = JSON.parse(document.querySelector("#message-data").value);
    const page = document.querySelector("#page-template").content.cloneNode(true);
    page.querySelector("[data-role]").textContent = `pi · ${message.role}`;
    page.querySelector("[data-date]").textContent = message.date;
    page.querySelector("[data-content]").innerHTML = message.body;
    document.querySelector("#app").replaceChildren(page);
    document.title = message.title;

    const toc = document.querySelector("#toc");
    const headings = [...document.querySelectorAll("#content h1,#content h2,#content h3,#content h4")];
    const links = headings.map((heading, index) => {
      heading.id = heading.id || `heading-${index}`;
      const link = document.createElement("a");
      link.href = `#${heading.id}`;
      link.dataset.level = heading.tagName.slice(1);
      link.textContent = heading.textContent;
      toc.appendChild(link);
      return link;
    });

    if (!links.length) {
      toc.parentElement.remove();
    } else {
      const updateActiveHeading = () => {
        const atBottom = document.documentElement.scrollHeight > window.innerHeight &&
          window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 1;
        const activeIndex = atBottom ? headings.length - 1 : headings.reduce(
          (active, heading, index) => heading.getBoundingClientRect().top <= 112 ? index : active,
          0,
        );
        links.forEach((link, index) => {
          const active = index === activeIndex;
          link.classList.toggle("active", active);
          if (active) link.setAttribute("aria-current", "location");
          else link.removeAttribute("aria-current");
        });
      };
      window.addEventListener("scroll", updateActiveHeading, { passive: true });
      window.addEventListener("resize", updateActiveHeading);
      updateActiveHeading();
    }
  </script>
</body>
</html>
